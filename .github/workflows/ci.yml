name: AI Ceremony CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      
      - name: Server syntax check
        working-directory: server
        run: node -c index.js && node -c db.js && node -c routes/api.js && node -c socket/handlers.js
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  deploy-test:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install & build
        run: |
          cd frontend && npm ci && npm run build
          cd ../server && npm ci
      
      - name: Start server & test
        env:
          CONTROL_PASSWORD: test123
        run: |
          cd server
          node index.js &
          sleep 3
          echo "=== Health check ==="
          curl -s http://localhost:6588/api/health | grep -q '"status":"ok"' && echo "✅ Health OK" || echo "❌ Health FAIL"
          echo "=== Mobile page ==="
          curl -s -o /dev/null -w "%{http_code}" http://localhost:6588/ | grep -q 200 && echo "✅ Mobile OK" || echo "❌ Mobile FAIL"
          echo "=== Control page ==="
          curl -s -o /dev/null -w "%{http_code}" http://localhost:6588/control | grep -q 200 && echo "✅ Control OK" || echo "❌ Control FAIL"
          echo "=== Display page ==="
          curl -s -o /dev/null -w "%{http_code}" http://localhost:6588/display | grep -q 200 && echo "✅ Display OK" || echo "❌ Display FAIL"
          echo "=== API endpoints ==="
          curl -s http://localhost:6588/api/stats | grep -q 'online' && echo "✅ Stats OK" || echo "❌ Stats FAIL"
          curl -s http://localhost:6588/api/system/state | grep -q 'mode' && echo "✅ State OK" || echo "❌ State FAIL"
          kill %1 2>/dev/null
